<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Slider</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="slider-container">
      <div class="slide">
        <img src="assets/img-1.jpg" alt="Img- 1" />
      </div>
      <div class="slide">
        <img src="assets/img-2.jpg" alt="Img- 2" />
      </div>
      <div class="slide">
        <img src="assets/img-3.jpg" alt="Img- 3" />
      </div>
      <button class="prev" data-index="1">&#10094;</button>
      <button class="next" data-index="2">&#10095;</button>
    </div>
    <script type="module" src="script.js"></script>
  </body>
</html>
